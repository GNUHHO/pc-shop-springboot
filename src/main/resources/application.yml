server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: dynamic-pricing-supply-chain

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dynamic_pricing_supply_chain}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true